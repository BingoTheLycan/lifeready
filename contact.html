<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact - LifeReady</title>
<style>
:root {
  --bg:#0f1115; --bg2:#171a21; --border:#2b3140; --text:#f4f7fb; --text2:#b8c0d0;
}
* { box-sizing:border-box; }
body { margin:0; font-family:Arial, Helvetica, sans-serif; background:var(--bg); color:var(--text); }
main { max-width:820px; margin:0 auto; padding:28px 18px 56px; }
.card { background:var(--bg2); border:1px solid var(--border); border-radius:18px; padding:22px 18px; }
a { color:#d7cfff; }
h1 { margin-top:0; }
p, li { color:var(--text2); line-height:1.7; }
.back {
  display:inline-block; margin-bottom:16px; text-decoration:none; color:var(--text); border:1px solid var(--border);
  border-radius:999px; padding:8px 12px; background:var(--bg2);
}
</style>
</head>
<body>
<main>
  <a class="back" href="index.html">← Back to LifeReady</a>
  <div class="card">
    <h1>Contact</h1>
    
<p>Questions, feedback, and accessibility notes are welcome.</p>
<p><strong>Email:</strong> replace-this-with-your-email@example.com</p>
<p>Before sharing publicly, replace the email above with the address you want people to use.</p>

  </div>
</main>
</body>
</html>
